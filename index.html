<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все будет хорошо — Твой карманный друг</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #0c4a6e;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .battery-box {
            display: inline-flex;
            align-items: center;
            background-color: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            color: #0f766e;
            margin-bottom: 20px;
        }
        .battery-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus {
            border-color: #38bdf8;
        }
        button {
            background-color: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0284c7;
        }
        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }
        .response-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8fafc;
            border-left: 4px solid #38bdf8;
            border-radius: 4px 12px 12px 4px;
            text-align: left;
            min-height: 50px;
            display: none;
            line-height: 1.5;
        }
        .pay-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 12px;
        }
        .pay-btn {
            background-color: #ef4444;
            margin-top: 10px;
        }
        .pay-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Все будет хорошо</h1>
    <p class="subtitle">Давай устроим экспресс-сеанс поддержки. Я внимательно слушаю.</p>
    
    <div class="battery-box">
        <span class="battery-icon">🔋</span> Осталось ответов в сеансе: <span id="limit-count">5</span>/5
    </div>

    <textarea id="user-input" placeholder="Напиши сюда свои мысли или ответь на вопрос ИИ..."></textarea>
    <button id="send-btn" onclick="askAI()">Поделиться</button>

    <div id="response" class="response-box"></div>

    <div id="pay-zone" class="pay-box">
        <p style="color: #991b1b; margin: 0; font-size: 14px;">Ваш бесплатный экспресс-сеанс окончен. Батарейка зарядится завтра бесплатно, или вы можете продолжить наш душевный разговор прямо сейчас.</p>
        <button class="pay-btn" onclick="window.open('https://yoomoney.ru&', '_blank')">Начать новый сеанс за 30 руб.</button>
    </div>
</div>

<script>
    // Изменили лимит на 5 сообщений
    let maxLimits = 5;
    let currentLimits = localStorage.getItem('ai_limits_v3') !== null ? parseInt(localStorage.getItem('ai_limits_v3')) : maxLimits;
    
    let chatHistory = [
        {
            role: 'system', 
            content: 'Ты — самый добрый, чуткий и поддерживающий друг и психолог на свете. Твоя цель — вести последовательный, логичный и глубокий диалог с пользователем в рамках короткого экспресс-сеанса из 5 шагов. Задавай наводящие мягкие вопросы, внимательно цепляйся за детали из прошлых ответов. Используй короткие, понятные предложения. Показывай, что ты помнишь всё, что он сказал ранее.'
        }
    ];

    function updateUI() {
        document.getElementById('limit-count').innerText = currentLimits;
        if (currentLimits <= 0) {
            document.getElementById('user-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('pay-zone').style.display = 'block';
        }
    }
    updateUI();

    async function askAI() {
        const text = document.getElementById('user-input').value.trim();
        if (!text) return alert("Пожалуйста, напиши что-нибудь.");
        
        const responseBox = document.getElementById('response');
        const sendBtn = document.getElementById('send-btn');
        
        sendBtn.disabled = true;
        sendBtn.innerText = "Обдумываю твои слова...";
        responseBox.style.display = "block";
        responseBox.innerText = "Внимательно читаю...";

        chatHistory.push({ role: 'user', content: text });

        // Теперь триггер срабатывает на 1 оставшемся сообщении (то есть на 5-м шаге)
        if (currentLimits === 1) {
            chatHistory.push({ 
                role: 'system', 
                content: 'ВНИМАНИЕ: Это твой последний 5-й ответ. Сеанс завершен. Тебе нужно логично и очень мягко подвести итог беседы, подбодрить пользователя, сказать, что всё обязательно будет хорошо, и в самом конце сообщения добавить фразу: "Наш сегодняшний бесплатный экспресс-сеанс подошел к концу. Чтобы продолжить наш разговор без ограничений, пожалуйста, заряди батарейку поддержки ниже. Я буду очень ждать тебя!".' 
            });
        }

        try {
            const response = await fetch('https://proxyapi.ru', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer sk-MxrX305sh2mHt5FW9TP7khb2Uf5VbpKZ' // Твой ключ от ProxyAPI
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: chatHistory
                })
            });

            const data = await response.json();
            const aiReply = data.choices.message.content;
            
            chatHistory.push({ role: 'assistant', content: aiReply });
            responseBox.innerText = aiReply;
            
            currentLimits--;
            localStorage.setItem('ai_limits_v3', currentLimits);
            updateUI();

            document.getElementById('user-input').value = "";

        } catch (error) {
            responseBox.innerText = "Ой, я немного отвлекся. Повтори, пожалуйста, я очень хочу тебя выслушать.";
            console.error(error);
        } finally {
            if (currentLimits > 0) {
                sendBtn.disabled = false;
                sendBtn.innerText = "Поделиться";
            }
        }
    }
</script>

</body>
</html>
