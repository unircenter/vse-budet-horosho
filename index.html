<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все будет хорошо — Твой карманный друг</title>
    <!-- Подключаем внешние стили CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Все будет хорошо</h1>
    <p class="subtitle" id="welcome-text">Давай устроим экспресс-сеанс поддержки. Я внимательно слушаю.</p>
    
    <div class="battery-box">
        <span class="battery-icon">🔋</span> Осталось ответов в сеансе: <span id="limit-count">5</span>
    </div>

    <textarea id="user-input" placeholder="Поделись тем, что у тебя на душе, или просто ответь мне..."></textarea>
    <button id="send-btn" onclick="askAI()">Поделиться</button>

    <div id="response" class="response-box"></div>
    <button id="voice-btn" onclick="speakText()">🔊 Включить живой голос</button>

    <div id="pay-zone" class="pay-box">
        <p class="pay-title">Бесплатный сеанс окончен. Выберите пакет и оплатите в 1 клик:</p>
        
        <button class="tariff-btn" onclick="startRecharge(5)">Продлить сеанс (+5 ответов) — 50 руб.</button>
        <button class="tariff-btn" onclick="startRecharge(10)">Глубокий разбор (+10 ответов) — 75 руб.</button>
        <button class="tariff-btn" onclick="startRecharge(25)">Безлимит на evening (+25 ответов) — 99 руб.</button>
        
        <div id="timer-status">Ожидание оплаты... Откройте приложение банка. Батарейка зарядится через 40 сек.</div>
    </div>
</div>

<!-- Подключаем внешнюю логику JavaScript -->
<script src="script.js"></script>

</body>
</html>
